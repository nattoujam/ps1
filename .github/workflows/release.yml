name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: "Explicit version (e.g. 1.2.3) — overrides bump type if set"
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compute next version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            NEXT="${{ github.event.inputs.version }}"
          else
            CURRENT=$(grep '^VERSION=' ps1 | sed 's/.*"\(.*\)".*/\1/')
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            case "${{ github.event.inputs.bump }}" in
              major) NEXT="$((MAJOR+1)).0.0" ;;
              minor) NEXT="${MAJOR}.$((MINOR+1)).0" ;;
              patch) NEXT="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
            esac
          fi
          echo "next=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "Next version: ${NEXT}"

      - name: Update version in ps1
        run: |
          sed -i 's/^VERSION="[^"]*"/VERSION="${{ steps.ver.outputs.next }}"/' ps1

      - name: Commit, tag, and sync release branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ps1
          git commit -m "chore: bump version to v${{ steps.ver.outputs.next }}"
          git tag "v${{ steps.ver.outputs.next }}"
          git push origin HEAD --tags
          git push origin HEAD:release --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ steps.ver.outputs.next }}"
          generate_release_notes: true
          files: |
            ps1
            assets/presets
            assets/helpers
